<!-- REGISTER PAGE -->
<ion-content class="register-content">

  <div class="overlay"></div>

  <div class="register-wrapper">

    <!-- LEFT PANEL -->
    <div class="branding-section">

      <div class="branding-content">

        <img
          src="assets/icon/logo.png"
          alt="Dental Premium"
          class="logo"
        />

        <h1>Únete a Dental Premium</h1>

        <p>
          Gestiona tus citas odontológicas, especialistas y recordatorios desde cualquier dispositivo.
        </p>

        <div class="feature-list">

          <div class="feature-item">

            <ion-icon name="medkit-outline"></ion-icon>

            <span>
              Especialistas certificados
            </span>

          </div>

          <div class="feature-item">

            <ion-icon name="calendar-clear-outline"></ion-icon>

            <span>
              Reserva rápida de citas
            </span>

          </div>

          <div class="feature-item">

            <ion-icon name="phone-portrait-outline"></ion-icon>

            <span>
              Compatible con Android y Web
            </span>

          </div>

        </div>

      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="form-section">

      <ion-card class="register-card">

        <ion-card-content>

          <div class="header">

            <h2>Crear Cuenta</h2>

            <p>
              Registra tus datos para comenzar
            </p>

          </div>

          <!-- NOMBRE -->
          <div class="custom-input">

            <ion-icon name="person-outline"></ion-icon>

            <ion-input
              type="text"
              placeholder="Nombres completos"
              [(ngModel)]="name">
            </ion-input>

          </div>
          
          <!-- CONTENEDOR DE DNI Y TELEFONO -->
          <div class="custom-input-container">
            <!-- DNI -->
            <div class="custom-input">
              <ion-icon name="card-outline"></ion-icon>

              <ion-input
                type="text"
                placeholder="DNI"
                [(ngModel)]="dni">
              </ion-input>
            </div>
            <!-- TELEFONO --> 
            <div class="custom-input">
              <ion-icon name="call-outline"></ion-icon>

            <ion-input
              type="tel"
              placeholder="Teléfono"
              [(ngModel)]="phone">
            </ion-input>

            </div>
          </div>
          

          <!-- EMAIL -->
          <div class="custom-input">

            <ion-icon name="mail-outline"></ion-icon>

            <ion-input
              type="email"
              placeholder="Correo electrónico"
              [(ngModel)]="email">
            </ion-input>

          </div>

          <!-- PASSWORD -->
          <div class="custom-input">

            <ion-icon name="lock-closed-outline"></ion-icon>

            <ion-input
              type="password"
              placeholder="Contraseña"
              [(ngModel)]="password">
            </ion-input>

          </div>

          <!-- BOTON -->
          <ion-button
            expand="block"
            class="register-button"
            (click)="register()">

            Crear Cuenta

          </ion-button>

          <!-- LOGIN -->
          <div class="login-section">

            <span>
              ¿Ya tienes cuenta?
            </span>

            <button
              class="login-link"
              routerLink="/login">

              Iniciar Sesión

            </button>

          </div>

        </ion-card-content>

      </ion-card>

    </div>

  </div>

</ion-content>
