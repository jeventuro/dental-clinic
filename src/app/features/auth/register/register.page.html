<!-- REGISTER PAGE -->

<ion-content class="register-content">

  <div class="register-container">

    <ion-card>

      <ion-card-content>

        <h2>Crear Cuenta</h2>

        <ion-item>
          <ion-input
            label="Nombre completo"
            labelPlacement="floating"
            [(ngModel)]="user.name">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="DNI"
            labelPlacement="floating"
            [(ngModel)]="user.dni">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Teléfono"
            labelPlacement="floating"
            [(ngModel)]="user.phone">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Correo"
            labelPlacement="floating"
            [(ngModel)]="user.email">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Contraseña"
            labelPlacement="floating"
            type="password"
            [(ngModel)]="user.password">
          </ion-input>
        </ion-item>

        <ion-button expand="block" (click)="register()">
          Registrarse
        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
