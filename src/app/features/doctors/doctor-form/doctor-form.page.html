<!-- src/app/features/doctors/doctor-form/doctor-form.page.html -->
<ion-content class="form-page">
  <div class="page-container">

    <header class="page-header">
      <div>
        <button class="btn-back" (click)="goBack()">
          <ion-icon name="arrow-back-outline"></ion-icon>
          Volver
        </button>
        <h1>{{ isEdit ? 'Editar Doctor' : 'Nuevo Doctor' }}</h1>
        <p>{{ isEdit ? 'Actualiza la información del especialista' : 'Agrega un nuevo especialista al equipo' }}</p>
      </div>
    </header>

    <form (ngSubmit)="onSubmit()" #doctorForm="ngForm" class="doctor-form">

      <div class="form-group">
        <label>Nombre completo <span class="required">*</span></label>
        <input
          type="text"
          class="custom-input"
          [(ngModel)]="formData.nombre_completo"
          name="nombre"
          placeholder="Ej: Dr. Carlos Mendoza"
          required
        />
      </div>

      <div class="form-group">
        <label>Correo electrónico <span class="required">*</span></label>
        <input
          type="email"
          class="custom-input"
          [(ngModel)]="formData.email"
          name="email"
          placeholder="doctor@clinica.com"
          required
        />
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input
          type="tel"
          class="custom-input"
          [(ngModel)]="formData.telefono"
          name="telefono"
          placeholder="+51 987654321"
        />
      </div>

      <div class="form-group">
        <label>Especialidad <span class="required">*</span></label>
        <input
          type="text"
          class="custom-input"
          [(ngModel)]="formData.especialidad"
          name="especialidad"
          placeholder="Ej: Ortodoncia, Endodoncia, Implantología..."
          required
        />
      </div>

      <div class="form-group">
        <label>Horario</label>
        <input
          type="text"
          class="custom-input"
          [(ngModel)]="formData.horario"
          name="horario"
          placeholder="Ej: Lun-Vie 9:00-18:00"
        />
      </div>

      <div class="form-group">
        <label>Sede <span class="required">*</span></label>
        <select
          class="custom-select"
          [(ngModel)]="formData.sede_id"
          name="sede_id"
          required
        >
          <option value="" disabled selected>Selecciona una sede...</option>
          <option *ngFor="let sede of sedes" [value]="sede.id">{{ sede.nombre }}</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-outline" (click)="goBack()">
          <ion-icon name="close-outline"></ion-icon>
          Cancelar
        </button>
        <button type="submit" class="btn-submit" [disabled]="isSubmitting || doctorForm.invalid">
          <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
          <ion-icon *ngIf="!isSubmitting" name="save-outline"></ion-icon>
          {{ isSubmitting ? 'Guardando...' : 'Guardar Doctor' }}
        </button>
      </div>

    </form>

  </div>
</ion-content>
