<!-- src/app/features/profile/profile.page.html -->
<ion-content class="profile-page">
  <div class="page-container">

    <header class="page-header">
      <div>
        <h1>Mi Perfil</h1>
        <p>Gestiona tu información personal</p>
      </div>
      <div class="header-actions">
        <button *ngIf="!isEditing" class="btn-primary" (click)="toggleEdit()">
          <ion-icon name="create-outline"></ion-icon>
          Editar
        </button>
        <button *ngIf="isEditing" class="btn-outline" (click)="toggleEdit()">
          <ion-icon name="close-outline"></ion-icon>
          Cancelar
        </button>
        <button *ngIf="isEditing" class="btn-primary" (click)="saveProfile()">
          <ion-icon name="save-outline"></ion-icon>
          Guardar
        </button>
      </div>
    </header>

    <!-- Avatar / Foto de perfil -->
    <div class="avatar-section">
      <div class="avatar">
        {{ patient.fullName.charAt(0) || '?' }}
      </div>
      <h2>{{ patient.fullName || 'Sin nombre' }}</h2>
      <p class="role">{{ isAdmin ? 'Administrador' : 'Paciente' }}</p>
    </div>

    <!-- Información del perfil -->
    <div class="profile-form">
      <div class="form-row">
        <div class="form-group">
          <label>Nombre completo</label>
          <input
            type="text"
            class="custom-input"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.fullName"
            [disabled]="!isEditing"
            placeholder="Tu nombre completo"
          >
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input
            type="email"
            class="custom-input"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.email"
            [disabled]="!isEditing"
            placeholder="tu@email.com"
          >
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>DNI</label>
          <input
            type="text"
            class="custom-input"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.dni"
            [disabled]="!isEditing"
            placeholder="DNI"
          >
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input
            type="tel"
            class="custom-input"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.phone"
            [disabled]="!isEditing"
            placeholder="+51 987654321"
          >
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Dirección</label>
          <input
            type="text"
            class="custom-input"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.address"
            [disabled]="!isEditing"
            placeholder="Av. Principal 123"
          >
        </div>
        <div class="form-group">
          <label>Contacto de emergencia</label>
          <input
            type="text"
            class="custom-input"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.emergencyContact"
            [disabled]="!isEditing"
            placeholder="Nombre y teléfono"
          >
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tipo de sangre</label>
          <select
            class="custom-select"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.bloodType"
            [disabled]="!isEditing"
          >
            <option value="">Seleccionar...</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>
        <div class="form-group">
          <label>Alergias</label>
          <input
            type="text"
            class="custom-input"
            [class.edit-mode]="isEditing"
            [(ngModel)]="patient.allergies"
            [disabled]="!isEditing"
            placeholder="Ej: Penicilina, Polen..."
          >
        </div>
      </div>
    </div>

    <!-- Botón de cierre de sesión -->
    <div class="logout-section">
      <button class="btn-logout" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
        Cerrar sesión
      </button>
    </div>

  </div>
</ion-content>
