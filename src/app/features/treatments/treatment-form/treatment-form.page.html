<!-- src/app/features/tratamientos/treatment-form/treatment-form.page.html -->
<ion-content class="form-page">
  <div class="page-container">

    <header class="page-header">
      <div>
        <button class="btn-back" (click)="goBack()">
          <ion-icon name="arrow-back-outline"></ion-icon>
          Volver
        </button>
        <h1>{{ isEdit ? 'Editar Tratamiento' : 'Nuevo Tratamiento' }}</h1>
        <p>{{ isEdit ? 'Actualiza la información del servicio' : 'Agrega un nuevo servicio al catálogo' }}</p>
      </div>
    </header>

    <form (ngSubmit)="onSubmit()" #treatmentForm="ngForm" class="treatment-form">

      <div class="form-group">
        <label>Nombre del Tratamiento <span class="required">*</span></label>
        <input
          type="text"
          class="custom-input"
          [(ngModel)]="formData.nombre"
          name="nombre"
          placeholder="Ej: Limpieza Dental Avanzada"
          required
        />
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea
          class="custom-textarea"
          [(ngModel)]="formData.descripcion"
          name="descripcion"
          placeholder="Describe el tratamiento..."
          rows="3"
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Precio (S/.) <span class="required">*</span></label>
          <input
            type="number"
            class="custom-input"
            [(ngModel)]="formData.precio"
            name="precio"
            placeholder="0.00"
            min="0"
            step="0.01"
            required
          />
        </div>
        <div class="form-group">
          <label>Duración (minutos) <span class="required">*</span></label>
          <input
            type="number"
            class="custom-input"
            [(ngModel)]="formData.duracion"
            name="duracion"
            placeholder="30"
            min="1"
            step="5"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label>Especialidad</label>
        <input
          type="text"
          class="custom-input"
          [(ngModel)]="formData.especialidad"
          name="especialidad"
          placeholder="Ej: Odontología General, Ortodoncia, Endodoncia..."
        />
      </div>

      <div class="form-group toggle-group">
        <label>Estado</label>
        <div class="toggle-container">
          <ion-toggle
            [(ngModel)]="formData.activo"
            name="activo"
            color="primary"
          >
            {{ formData.activo ? 'Activo' : 'Inactivo' }}
          </ion-toggle>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-outline" (click)="goBack()">
          <ion-icon name="close-outline"></ion-icon>
          Cancelar
        </button>
        <button type="submit" class="btn-submit" [disabled]="isSubmitting || treatmentForm.invalid">
          <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
          <ion-icon *ngIf="!isSubmitting" name="save-outline"></ion-icon>
          {{ isSubmitting ? 'Guardando...' : 'Guardar Tratamiento' }}
        </button>
      </div>

    </form>

  </div>
</ion-content>
